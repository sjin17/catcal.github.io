<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>码字 · 写作台</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23a3683f'/%3E%3Ctext x='32' y='44' font-size='38' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3E字%3C/text%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#f5f5f7; --panel:#ffffff; --panel2:#f0f0f2; --text:#1d1d1f; --muted:#86868b;
    --line:rgba(0,0,0,.09); --accent:#0071e3; --accent-soft:#e9f1fd; --danger:#ff3b30; --ok:#34c759;
    --shadow:0 8px 30px rgba(0,0,0,.08); --bar:rgba(255,255,255,.72);
  }
  [data-theme="dark"]{
    --bg:#000000; --panel:#1c1c1e; --panel2:#2c2c2e; --text:#f5f5f7; --muted:#98989d;
    --line:rgba(255,255,255,.14); --accent:#0a84ff; --accent-soft:#0a2540; --danger:#ff453a; --ok:#30d158;
    --shadow:0 8px 30px rgba(0,0,0,.5); --bar:rgba(28,28,30,.72);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer}
  input,textarea{font-family:inherit}
  .hide{display:none !important}
  .grow{flex:1}

  /* 登录 */
  #login{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);width:340px;padding:34px 30px;text-align:center}
  .logo{font-size:26px;font-weight:700;letter-spacing:2px;margin-bottom:6px}
  .logo b{color:var(--accent)}
  .login-sub{color:var(--muted);font-size:13px;margin-bottom:24px}
  .fld{margin-bottom:14px;text-align:left}
  .fld label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .fld input{width:100%;border:1px solid var(--line);background:var(--bg);color:var(--text);border-radius:11px;padding:11px 13px;font-size:15px;outline:none}
  .fld input:focus{border-color:var(--accent)}
  .login-btn{width:100%;border:none;background:var(--accent);color:#fff;border-radius:11px;padding:12px;font-size:15px;font-weight:600;margin-top:6px}
  .login-switch{margin-top:16px;font-size:13px;color:var(--muted)}
  .login-switch a{color:var(--accent);cursor:pointer}
  .login-note{margin-top:20px;font-size:11.5px;color:var(--muted);max-width:340px;line-height:1.6}

  /* 顶栏 */
  .topbar{display:flex;align-items:center;gap:14px;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0}
  .brand{font-weight:700;font-size:16px;letter-spacing:1px;white-space:nowrap;cursor:pointer}
  .brand b{color:var(--accent)}
  .tabs{display:flex;gap:4px;background:var(--bg);border-radius:11px;padding:4px}
  .tabs button{border:none;background:transparent;color:var(--muted);padding:7px 16px;border-radius:8px;font-size:13.5px;font-weight:600;white-space:nowrap}
  .tabs button.active{background:var(--accent);color:#fff}
  .tbtn{border:1px solid var(--line);background:var(--panel);color:var(--text);height:34px;padding:0 12px;border-radius:9px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .today{font-size:12px;color:var(--muted);white-space:nowrap}
  .today b{color:var(--accent);font-weight:600}
  .curwork{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;padding-right:4px;border-right:1px solid var(--line)}
  .curwork::before{content:"《";color:var(--muted)} .curwork::after{content:"》";color:var(--muted)}

  main{height:calc(100vh - 55px);overflow:hidden;position:relative}
  .view{position:absolute;inset:0;display:none}
  .view.active{display:flex}

  /* 作品台 */
  #dash{flex-direction:column;overflow:auto}
  .dash-inner{max-width:920px;margin:0 auto;width:100%;padding:30px 24px 60px}
  .dash-h{display:flex;align-items:center;margin-bottom:20px}
  .dash-h h1{font-size:22px;font-weight:700}
  .works{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
  .wcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;transition:.15s;min-height:120px;display:flex;flex-direction:column;cursor:pointer}
  .wcard:hover{border-color:var(--accent);box-shadow:var(--shadow)}
  .wcard .wt{font-size:16px;font-weight:600;margin-bottom:8px}
  .wcard .wm{font-size:12px;color:var(--muted);line-height:1.7;flex:1}
  .wcard .wa{display:flex;gap:8px;margin-top:10px;opacity:0;transition:.15s}
  .wcard:hover .wa{opacity:1}
  .wa button{border:none;background:var(--panel2);color:var(--muted);border-radius:7px;padding:5px 9px;font-size:12px}
  .wa button:hover{color:var(--accent)}
  .wa button.del:hover{color:var(--danger)}
  .wcard.add{align-items:center;justify-content:center;color:var(--accent);border:1.5px dashed var(--line);font-size:14px;font-weight:600}
  .cal{margin-top:34px}
  .cal h3{font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:700;letter-spacing:.5px}
  .cal-months{display:flex;gap:28px;flex-wrap:wrap}
  .cal-month .cm-title{font-size:13px;font-weight:600;margin-bottom:8px}
  .cal-week{display:grid;grid-template-columns:repeat(7,46px);gap:5px}
  .cal-wd{font-size:11px;color:var(--muted);text-align:center;padding-bottom:2px}
  .cal-day{height:46px;border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:3px 4px;display:flex;flex-direction:column;justify-content:space-between}
  .cal-day.empty{border:none;background:transparent}
  .cal-day.has{border-color:var(--accent)}
  .cal-day .dn{font-size:11px;color:var(--muted)}
  .cal-day.today2 .dn{color:var(--accent);font-weight:700}
  .cal-day .dv{font-size:11px;color:var(--accent);font-weight:600;text-align:right}

  /* 通用左侧章节列表 */
  .col-list{width:220px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
  .cl-head{padding:14px 14px 8px;display:flex;align-items:center;gap:8px}
  .cl-head h2{font-size:12px;color:var(--muted);letter-spacing:.5px;font-weight:700;flex:1}
  .ic-add{border:none;background:var(--accent-soft);color:var(--accent);width:24px;height:24px;border-radius:7px;font-size:16px;font-weight:700}
  .scroller{flex:1;overflow:auto;padding:4px 8px 14px}
  .li{display:flex;align-items:center;gap:6px;padding:9px 10px;border-radius:9px;font-size:14px;margin-bottom:2px;cursor:pointer;color:var(--text)}
  .li:hover{background:var(--panel2)}
  .li.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .li .lt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .li .lw{font-size:11px;color:var(--muted)}
  .li .lic{opacity:0;border:none;background:none;color:var(--muted);font-size:13px;padding:0 2px}
  .li:hover .lic{opacity:.7}
  .li .lic:hover{color:var(--accent)}
  .li .lic.x:hover{color:var(--danger)}

  .pad{max-width:860px;margin:0 auto;width:100%;padding:26px 24px 60px}
  .linklike{border:none;background:none;color:var(--muted);font-size:12px}
  .linklike:hover{color:var(--danger)}

  /* 设定页（全展示） */
  #v-set{flex-direction:column;overflow:auto}
  .set-sec{padding-bottom:22px;margin-bottom:22px;border-bottom:1px solid var(--line)}
  .set-sec:last-child{border-bottom:none}
  .set-sec .ss-h{display:flex;align-items:center;gap:6px;margin-bottom:12px}
  .set-sec .ss-h h3{font-size:15px;font-weight:700}
  .set-sec .ss-h .cnt{color:var(--muted);font-size:12px;margin-left:6px;font-weight:400}
  .drag{cursor:grab;color:var(--muted);font-size:16px;padding:0 4px;user-select:none}
  .drag:hover{color:var(--accent)}
  .set-sec.dragging{opacity:.4}
  .set-sec.drop-before{border-top:2px solid var(--accent)}
  .set-sec.drop-after{border-bottom:2px solid var(--accent)}
  .set-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .set-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .set-card input.st{border:none;background:transparent;color:var(--text);font-size:15px;font-weight:600;width:100%;outline:none;margin-bottom:5px}
  .set-card textarea{border:none;background:transparent;color:var(--text);width:100%;outline:none;resize:vertical;min-height:46px;font-size:13.5px;line-height:1.7}
  .set-card .sc-foot{display:flex;justify-content:flex-end}

  /* 大纲页：左列表 + 右面板 */
  #v-out{overflow:hidden}
  .meta-main{flex:1;overflow:auto;padding:26px 30px}
  .meta-wrap{max-width:620px}
  .meta-main .mt-title{width:100%;border:none;background:transparent;color:var(--text);font-size:22px;font-weight:700;outline:none;margin-bottom:16px;border-bottom:1px solid var(--line);padding-bottom:8px}
  .lbl{font-size:12px;color:var(--muted);font-weight:600;margin:16px 0 6px;display:block}
  .ta{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:9px;padding:9px 11px;font-size:14px;line-height:1.7;outline:none;resize:none;overflow:hidden;min-height:38px}
  .ta:focus{border-color:var(--accent)}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .pchip{border:1px solid var(--line);background:var(--bg);color:var(--muted);padding:4px 12px;border-radius:16px;font-size:12.5px;cursor:pointer;transition:.15s}
  .pchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pchip.muted{cursor:default;font-style:italic}
  /* 事件 / 组件条目 */
  .ent{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px}
  .ent input,.ent textarea,.ent select{width:100%;border:none;background:transparent;color:var(--text);outline:none;font-family:inherit}
  .ent .e-when{font-size:12px;color:var(--accent);font-weight:600}
  .ent .e-title{font-size:14px;font-weight:600;margin:2px 0}
  .ent textarea{font-size:12.5px;color:var(--muted);resize:vertical;min-height:30px;line-height:1.5}
  .ent select{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer}
  .ent .e-foot{text-align:right}
  .addrow{display:flex;gap:8px;margin:4px 0 8px}

  /* 正文三栏 */
  #v-write{overflow:hidden}
  .ed-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;min-width:0}
  .hintbar{background:var(--panel2);border-bottom:1px solid var(--line);padding:12px 7%;flex-shrink:0}
  .hb-titlerow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .hb-titlerow input{flex:1;border:none;background:transparent;color:var(--accent);font-size:16px;font-weight:700;outline:none}
  .hb-titlerow .fold{border:none;background:none;color:var(--muted);font-size:12px}
  .hintbar.folded .hb-body{display:none}
  .hb-row{display:flex;align-items:flex-start;gap:4px;margin-bottom:3px}
  .hb-row .k{font-size:13.5px;color:var(--muted);font-weight:600;flex-shrink:0;padding-top:4px;white-space:nowrap}
  .hb-row .v{flex:1;min-width:0}
  .hbta{width:100%;border:none;background:transparent;color:var(--text);padding:4px 0;font-size:14px;line-height:1.6;outline:none;resize:none;overflow:hidden;min-height:1.6em}
  .hbta::placeholder{color:var(--muted);opacity:.55}
  .editor{flex:1;width:100%;border:none;background:transparent;color:var(--text);resize:none;outline:none;padding:24px 7% 50px;font-size:17px;line-height:2.1;letter-spacing:.3px}
  .statusbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:9px 7%;border-top:1px solid var(--line);background:var(--panel);flex-shrink:0}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:8px;background:var(--bg);border:1px solid var(--line);color:var(--muted)}
  .chip.ok{color:var(--ok)} .chip.warn{color:var(--danger)}
  .wcount{font-size:13px;font-weight:600;color:var(--text)}
  /* 右侧组件栏 */
  .side-r{width:270px;background:var(--panel);border-left:1px solid var(--line);overflow:auto;flex-shrink:0;padding:16px}
  .side-r h3{font-size:12px;color:var(--muted);letter-spacing:.5px;font-weight:700;margin:16px 0 10px;display:flex;align-items:center;border-top:1px solid var(--line);padding-top:16px}
  .side-r h3:first-child{border-top:none;padding-top:2px;margin-top:2px}
  .side-r h3 .ic-add{margin-left:auto}
  /* @引用 */
  .atpop{position:absolute;bottom:64px;left:7%;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:6px;min-width:160px;z-index:20}
  .atpop .ai{padding:7px 10px;border-radius:7px;font-size:13px;cursor:pointer}
  .atpop .ai:hover,.atpop .ai.sel{background:var(--accent-soft);color:var(--accent)}
  .atpop .empty{padding:8px 10px;font-size:12px;color:var(--muted)}

  /* 预览 */
  #v-prev{flex-direction:row}
  .prev-side{width:200px;background:var(--panel);border-right:1px solid var(--line);overflow:auto;flex-shrink:0;padding:8px}
  .prev-side .pli{padding:9px 11px;border-radius:8px;font-size:13.5px;cursor:pointer;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prev-side .pli:hover{background:var(--panel2)}
  .prev-side .pli.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .prev-main{flex:1;overflow:auto;background:var(--bg)}
  .reader{max-width:680px;margin:0 auto;width:100%;padding:44px 28px 90px}
  .reader h1{font-size:28px;font-weight:700;text-align:center;margin-bottom:34px}
  .reader h2{font-size:20px;font-weight:700;margin:36px 0 4px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .reader .cw{font-size:12px;color:var(--muted);margin-bottom:14px}
  .reader p{font-size:17px;line-height:2.1;text-indent:2em;margin-bottom:4px}

  /* 弹窗 */
  .modal-mask{position:fixed;inset:0;background:rgba(20,16,10,.42);display:flex;align-items:center;justify-content:center;z-index:200}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);width:340px;max-width:90vw;padding:22px}
  .modal h4{font-size:16px;font-weight:600;margin-bottom:6px}
  .modal p{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:14px}
  .modal input{width:100%;border:1px solid var(--line);background:var(--bg);color:var(--text);border-radius:10px;padding:10px 12px;font-size:15px;outline:none;margin-bottom:16px}
  .modal input:focus{border-color:var(--accent)}
  .modal-btns{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
  .mbtn{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:10px;padding:9px 16px;font-size:14px;font-weight:600}
  .mbtn.p{background:var(--accent);color:#fff;border-color:var(--accent)}
  .mbtn.d{background:var(--danger);color:#fff;border-color:var(--danger)}
  /* toast */
  #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:20px;font-size:13px;z-index:240;opacity:0;transition:opacity .25s;pointer-events:none}
  #toast.show{opacity:.95}
  /* 专注模式工具条 */
  #focusBar{position:fixed;top:0;left:0;right:0;height:46px;z-index:150;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 16px}
  #focusBar .fb-nav{border:1px solid var(--line);background:var(--panel);color:var(--text);width:32px;height:32px;border-radius:8px;font-size:15px}
  #focusBar .fb-nav:hover{border-color:var(--accent);color:var(--accent)}
  #focusBar select{border:1px solid var(--line);background:var(--bg);color:var(--text);border-radius:8px;padding:6px 10px;font-size:13.5px;font-weight:600;outline:none;max-width:260px}
  #focusBar .fb-exit{margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:18px;padding:7px 16px;font-size:13px;font-weight:600}
  body.focus .topbar,body.focus .col-list,body.focus .hintbar,body.focus .side-r{display:none}
  body.focus main{height:100vh}
  body.focus .editor{padding-top:60px}

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px}
  @media(max-width:820px){
    .side-r{display:none}
    .col-list{width:180px}
    .hintbar,.editor,.statusbar{padding-left:18px;padding-right:18px}
    .cal-week{grid-template-columns:repeat(7,40px)}.cal-day{height:42px}
    .prev-side{width:140px}
  }
  /* ===== Apple 风格润饰 ===== */
  h1,h2,h3,h4{letter-spacing:-.02em}
  .topbar{background:var(--bar);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)}
  .brand{font-weight:600}
  .tabs{background:var(--panel2);border-radius:9px;padding:3px;gap:2px}
  .tabs button{color:var(--muted);font-weight:500;border-radius:7px;transition:all .18s}
  .tabs button.active{background:var(--panel);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.12);font-weight:600}
  [data-theme="dark"] .tabs button.active{box-shadow:0 1px 4px rgba(0,0,0,.5)}
  .tbtn{border:1px solid var(--line);border-radius:980px;font-weight:500;background:var(--panel);transition:all .15s}
  .tbtn:hover{background:var(--panel2);border-color:var(--line);color:var(--text)}
  .tbtn:active{transform:scale(.96)}
  .curwork{border-right:none;font-weight:600;background:var(--panel2);padding:5px 12px;border-radius:980px;font-size:12.5px}
  .curwork::before,.curwork::after{content:""}
  /* 按钮主色 */
  .login-btn,.mbtn.p{background:var(--accent);border-radius:12px;font-weight:500;transition:all .15s;border:none}
  .login-btn:hover,.mbtn.p:hover{filter:brightness(1.06)}
  .login-btn:active,.mbtn:active{transform:scale(.98)}
  .mbtn{border-radius:12px;font-weight:500}
  .mbtn.d{background:var(--danger);border:none}
  /* 输入与卡片 */
  .fld input,.modal input,.ta,.hbta,.ent input,.ent textarea,.ent select,.set-card input,.set-card textarea,#focusBar select{transition:box-shadow .15s,border-color .15s}
  .fld input:focus,.modal input:focus,.ta:focus,.ent input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .login-card{border-radius:22px;box-shadow:var(--shadow)}
  .logo{font-weight:600;letter-spacing:-.5px}
  .wcard,.set-card,.modal,.ent{border-radius:16px}
  .wcard{transition:transform .18s,box-shadow .18s,border-color .18s}
  .wcard:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .modal{border-radius:20px;box-shadow:var(--shadow)}
  /* 分段/胶囊小元素 */
  .pchip{border-radius:980px;transition:all .15s}
  .pchip.on{box-shadow:0 1px 5px rgba(0,113,227,.3)}
  .chip{border-radius:980px;font-weight:500}
  .ic-add,.sb-add{border-radius:8px;transition:all .15s}
  .ic-add:active{transform:scale(.9)}
  /* 顶部提示条 & 专注条毛玻璃 */
  .hintbar{background:var(--bar);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px)}
  #focusBar{background:var(--bar);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px)}
  #focusBar .fb-exit{border-radius:980px}
  .statusbar{background:var(--bar);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px)}
  /* 列表项与日历 */
  .li{border-radius:10px;transition:background .15s}
  .li.active{font-weight:600}
  .cal-day{border-radius:10px}
  .pli{border-radius:10px}
  /* 滚动条 */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(140,140,140,.35);border-radius:980px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(140,140,140,.55)}
  ::-webkit-scrollbar-track{background:transparent}
  /* ===== 批注 / 修改批注 ===== */
  #commentFab{position:fixed;z-index:120;background:var(--accent);color:#fff;border:none;border-radius:980px;padding:7px 13px;font-size:12.5px;font-weight:600;box-shadow:var(--shadow);display:none;align-items:center;gap:4px}
  #commentFab.show{display:inline-flex}
  #commentFab:active{transform:scale(.95)}
  .cmt{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:10px}
  .cmt .para{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:4px}
  .cmt .q{font-size:12px;color:var(--muted);border-left:3px solid var(--accent);padding-left:8px;margin-bottom:7px;line-height:1.5;cursor:pointer}
  .cmt .q:hover{color:var(--text)}
  .cmt textarea{width:100%;border:none;background:transparent;color:var(--text);outline:none;resize:vertical;min-height:32px;font-size:13px;line-height:1.6;font-family:inherit}
  .cmt .cfoot{text-align:right}
  .modal textarea{width:100%;border:1px solid var(--line);background:var(--bg);color:var(--text);border-radius:10px;padding:10px 12px;font-size:14px;line-height:1.6;outline:none;resize:vertical;min-height:84px;margin-bottom:16px;font-family:inherit}
  .modal textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .modal .quote{background:var(--panel2);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px;max-height:130px;overflow:auto;border-left:3px solid var(--accent);white-space:pre-wrap}
  /* 版本管理 */
  .modal.wide{width:560px;max-width:92vw}
  .ver-list{max-height:340px;overflow:auto;margin:6px 0 14px}
  .ver-row{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
  .ver-row:last-child{border-bottom:none}
  .ver-meta{flex:1;min-width:0}
  .ver-meta .vl{font-size:14px;font-weight:600}
  .ver-meta .vt{font-size:12px;color:var(--muted)}
  .vbtns{display:flex;gap:6px;flex-shrink:0}
  .vmini{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:5px 11px;font-size:12.5px;font-weight:500}
  .vmini:hover{border-color:var(--accent);color:var(--accent)}
  .vmini.danger:hover{color:var(--danger);border-color:var(--danger)}
  .ver-empty{color:var(--muted);font-size:13px;padding:18px 2px;text-align:center}
  .difflegend{font-size:12px;color:var(--muted);margin-bottom:8px}
  .difflegend .a{color:var(--ok)} .difflegend .d{color:var(--danger)}
  .diff{max-height:360px;overflow:auto;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13.5px;line-height:1.8;margin-bottom:14px}
  .diff span{display:block;border-radius:4px;padding:1px 5px;white-space:pre-wrap;word-break:break-word}
  .diff .add{background:rgba(52,199,89,.16);color:var(--ok)}
  .diff .del{background:rgba(255,59,48,.14);color:var(--danger);text-decoration:line-through}
  .diff .eq{color:var(--muted)}
</style>
</head>

<script>
/* ================= 数据 ================= */
var KEY='mxz_db_v2';
var CATS=['人物','世界观','势力','地点','其他'];
var COMP_TYPES=['物品位置','其他条目','自定义'];
var DB=loadDB();
function loadDB(){
  var d; try{d=JSON.parse(localStorage.getItem(KEY));}catch(e){}
  if(!d||!d.works){
    /* 兼容旧版 v1 */
    var old; try{old=JSON.parse(localStorage.getItem('mxz_db_v1'));}catch(e){}
    d=old&&old.works?old:{user:null,works:[],theme:'light',lastTotal:0,history:{}};
  }
  d.works.forEach(function(w){
    if(!w.catOrder)w.catOrder=CATS.slice();CATS.forEach(function(c){if(w.catOrder.indexOf(c)<0)w.catOrder.push(c);});
    var ids={},byTitle={};w.settings.forEach(function(s){ids[s.id]=1;if(s.cat==='人物'&&byTitle[s.title]===undefined)byTitle[s.title]=s.id;});
    w.chapters.forEach(function(c){migrateChap(c);c.characters=c.characters.map(function(x){return ids[x]?x:(byTitle[x]!==undefined?byTitle[x]:null);}).filter(Boolean);});
  });
  return d;
}
function migrateChap(c){
  if(!c.characters)c.characters=[];
  if(c.plot===undefined)c.plot='';
  if(!c.events)c.events=[];
  if(!c.components)c.components=[];
  if(!c.comments)c.comments=[];
  if(!c.snapshots)c.snapshots=[];
  if(c.snapshots.length>3)c.snapshots=c.snapshots.slice(-3);   // 只保留最近 3 次快照
  if(c.outline===undefined)c.outline='';
  if(c.content===undefined)c.content='';
}
function saveDB(){DB.updatedAt=Date.now();localStorage.setItem(KEY,JSON.stringify(DB));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function today(){return new Date().toISOString().slice(0,10);}
function wlen(s){return (s||'').replace(/\s/g,'').length;}
function esc(t){return (t||'').replace(/[&<>]/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[m];});}
function attr(t){return (t||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function cnNum(n){var d='零一二三四五六七八九';if(n<10)return d[n];if(n===10)return '十';if(n<20)return '十'+d[n-10];var t=Math.floor(n/10),o=n%10;return d[t]+'十'+(o?d[o]:'');}

var $=function(id){return document.getElementById(id);};
var curWorkId=null,curChapterId=null,prevSel=null,loginMode='login';

/* 字数统计：旧版按"累计加字"算（加了又删也算进去），现改为全自动"净增量"：
   今日字数 = 当前总字数 − 今天起始总字数。粘贴/删除/敲字都按当前实际字数自动算差值。
   一次性把今天的起始基线设为"当前总字数"，从此刻起自动统计净增量。 */
(function fixDailyWordCount(){
  if(DB.wcNetFix2)return;DB.wcNetFix2=true;
  DB.history=DB.history||{};
  DB.dayBaselineDate=today();
  DB.dayBaseline=allWords();      // 以当前总字数为今天基线
  DB.history[today()]=0;          // 今天从 0 起，之后自动累加净增量
  saveDB();
})();

/* =====================================================================
   后端对接层：登录 + 作品同步 + 统计。本地 localStorage 仅作离线缓存。
   ===================================================================== */
/* ⚠️ 与后端 app.py 的路由前缀一致；后端地址确定后改这一行即可 */
var API_BASE='https://qisimiaoxiang.site/catcal/api';
var BACKEND=true;        // 设为 false 可纯本地调试（不连后端）
var TOKEN=localStorage.getItem('mxz_token')||'';
var online=true;
function setOnline(v){if(online!==v){online=v;var n=$('netState');if(n)n.textContent=online?'':'· 离线';}}
function apiFetch(method,path,body){
  var opt={method:method,headers:{'Content-Type':'application/json'}};
  if(TOKEN)opt.headers['Authorization']='Bearer '+TOKEN;
  if(body!==undefined)opt.body=JSON.stringify(body);
  return fetch(API_BASE+path,opt).then(function(r){
    setOnline(true);
    return r.text().then(function(t){var d;try{d=t?JSON.parse(t):{};}catch(e){d={};}
      if(r.status===401){TOKEN='';localStorage.removeItem('mxz_token');}
      if(!r.ok){var err=new Error(d.message||('HTTP '+r.status));err.status=r.status;throw err;}
      return d;});
  },function(netErr){setOnline(false);throw netErr;});
}
function migrateWorkObj(w){if(!w.catOrder)w.catOrder=CATS.slice();CATS.forEach(function(c){if(w.catOrder.indexOf(c)<0)w.catOrder.push(c);});if(!w.chapters)w.chapters=[];w.chapters.forEach(migrateChap);if(!w.curChapter&&w.chapters[0])w.curChapter=w.chapters[0].id;return w;}
/* 拉取作品列表（只含元信息），缺的以 stub 占位，打开时再取全文 */
function pullWorks(){
  if(!BACKEND)return Promise.resolve();
  return apiFetch('GET','/works').then(function(list){
    var ids={};DB.deleted=DB.deleted||{};
    list.forEach(function(m){
      if(DB.deleted[m.id]){apiFetch('DELETE','/works/'+m.id).then(function(){delete DB.deleted[m.id];saveDB();}).catch(function(){});return;}
      ids[m.id]=1;var w=DB.works.find(function(x){return x.id===m.id;});
      if(!w){DB.works.push({id:m.id,title:m.title,updatedAt:Date.parse(m.updated_at)||Date.now(),_stub:true,wcCache:m.word_count,settings:[],chapters:[],catOrder:CATS.slice(),dailyGoal:2000,curChapter:null});}
      else if(!w._unsynced){w.title=m.title;w.wcCache=m.word_count;}
    });
    DB.works=DB.works.filter(function(w){return ids[w.id]||w._new;});
    saveDB();if(curWorkId===null&&$('works'))renderWorks();
    syncDirty();
  }).catch(function(){});
}
function fetchWork(id){
  return apiFetch('GET','/works/'+id).then(function(full){migrateWorkObj(full);var i=DB.works.findIndex(function(x){return x.id===id;});if(i>=0)DB.works[i]=full;else DB.works.push(full);saveDB();});
}
function cleanWork(w){var c={};for(var k in w){if(k.charAt(0)!=='_'&&k!=='wcCache')c[k]=w[k];}return c;}
function syncWork(w){
  if(!BACKEND||!TOKEN||!w||w._stub)return Promise.resolve();
  var body=cleanWork(w);
  var p=w._new?apiFetch('POST','/works',body):apiFetch('PUT','/works/'+w.id,body);
  return p.then(function(){w._new=false;w._unsynced=false;},function(){w._unsynced=true;});
}
function syncDirty(){if(!BACKEND||!TOKEN)return;DB.works.forEach(function(w){if(w._unsynced&&!w._stub)syncWork(w);});}
var pushTimers={};
function scheduleWorkPush(w){if(!BACKEND||!TOKEN||!w||w._stub)return;clearTimeout(pushTimers[w.id]);pushTimers[w.id]=setTimeout(function(){syncWork(w);},900);}
/* 统计 */
function pullStats(){if(!BACKEND||!TOKEN)return Promise.resolve();return apiFetch('GET','/stats').then(function(s){if(s&&typeof s==='object'){DB.history=Object.assign({},DB.history,s);DB.history[today()]=Math.max(0,allWords()-(DB.dayBaseline||0));saveDB();if($('calGrid'))renderCalendar();renderToday();}}).catch(function(){});}
var statTimer=null;
function pushStats(){if(!BACKEND||!TOKEN)return;clearTimeout(statTimer);statTimer=setTimeout(function(){apiFetch('PUT','/stats',DB.history).catch(function(){});},1500);}
function W(){return DB.works.find(function(x){return x.id===curWorkId;});}
function CH(){var w=W();return w&&(w.chapters.find(function(c){return c.id===curChapterId;})||w.chapters[0]);}
function chapIndex(){var w=W();return w.chapters.findIndex(function(c){return c.id===curChapterId;});}
function workWords(w){return w.chapters.reduce(function(s,c){return s+wlen(c.content);},0);}
function allWords(){return DB.works.reduce(function(s,w){return s+workWords(w);},0);}

/* ================= 弹窗 / toast ================= */
function closeModal(){$('modal').classList.add('hide');$('modal').innerHTML='';}
function showPrompt(title,def,onOk){
  $('modal').innerHTML='<div class="modal"><h4>'+esc(title)+'</h4><input id="mInput" value="'+attr(def||'')+'"><div class="modal-btns"><button class="mbtn" id="mCancel">取消</button><button class="mbtn p" id="mOk">确定</button></div></div>';
  $('modal').classList.remove('hide');var inp=$('mInput');inp.focus();inp.select();
  $('mCancel').onclick=closeModal;$('mOk').onclick=function(){var v=inp.value;closeModal();onOk(v);};
  inp.onkeydown=function(e){if(e.key==='Enter'){var v=inp.value;closeModal();onOk(v);}if(e.key==='Escape')closeModal();};
}
function showConfirm(title,msg,onOk,danger){
  $('modal').innerHTML='<div class="modal"><h4>'+esc(title)+'</h4>'+(msg?'<p>'+esc(msg)+'</p>':'')+'<div class="modal-btns"><button class="mbtn" id="mCancel">取消</button><button class="mbtn '+(danger?'d':'p')+'" id="mOk">'+(danger?'删除':'确定')+'</button></div></div>';
  $('modal').classList.remove('hide');$('mCancel').onclick=closeModal;$('mOk').onclick=function(){closeModal();onOk();};
}
function showChoice(title,opts){
  var btns=opts.map(function(o,i){return '<button class="mbtn'+(i===0?' p':'')+'" data-i="'+i+'">'+esc(o.label)+'</button>';}).join('');
  $('modal').innerHTML='<div class="modal"><h4>'+esc(title)+'</h4><div class="modal-btns"><button class="mbtn" id="mCancel">取消</button>'+btns+'</div></div>';
  $('modal').classList.remove('hide');$('mCancel').onclick=closeModal;
  Array.prototype.forEach.call($('modal').querySelectorAll('[data-i]'),function(b){b.onclick=function(){closeModal();opts[+b.dataset.i].fn();};});
}
function showInfo(title,msg){$('modal').innerHTML='<div class="modal"><h4>'+esc(title)+'</h4>'+(msg?'<p>'+esc(msg)+'</p>':'')+'<div class="modal-btns"><button class="mbtn p" id="mOk">知道了</button></div></div>';$('modal').classList.remove('hide');$('mOk').onclick=closeModal;}
$('modal').addEventListener('click',function(e){if(e.target===$('modal'))closeModal();});
var toastT=null;
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},1600);}

/* ================= 公共：自增长文本框 / 人物chips ================= */
function grow(el){el.style.height='auto';el.style.height=(el.scrollHeight)+'px';}
function autoGrow(el){grow(el);el.addEventListener('input',function(){grow(el);});}
function buildCharChips(container,chap,onChange){
  var w=W();var people=w.settings.filter(function(s){return s.cat==='人物';});
  container.innerHTML='';
  if(!people.length){container.innerHTML='<span class="pchip muted">先去"设定→人物"添加角色</span>';return;}
  people.forEach(function(s){
    var on=chap.characters.indexOf(s.id)>=0;
    var el=document.createElement('span');el.className='pchip'+(on?' on':'');el.textContent=s.title||'未命名';
    el.onclick=function(){var i=chap.characters.indexOf(s.id);if(i>=0)chap.characters.splice(i,1);else chap.characters.push(s.id);el.classList.toggle('on');touchSave();if(onChange)onChange();};
    container.appendChild(el);
  });
}

/* ================= 登录 ================= */
$('lg-switch').onclick=function(){loginMode=loginMode==='login'?'register':'login';$('lg-btn').textContent=loginMode==='login'?'登录':'注册并进入';$('lg-tip').textContent=loginMode==='login'?'还没有账号？':'已有账号？';$('lg-switch').textContent=loginMode==='login'?'注册一个':'去登录';};
$('lg-btn').onclick=doLogin;
$('lg-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function loginError(msg){var e=$('lg-err');if(e){e.textContent=msg||'';e.style.display=msg?'block':'none';}}
function doLogin(){
  var u=$('lg-user').value.trim(),p=$('lg-pass').value;loginError('');
  if(!u){$('lg-user').focus();return;}
  if(!BACKEND){DB.user={id:0,username:u,name:u};saveDB();enterApp();return;}
  if(!p){loginError('请输入密码');return;}
  var path=loginMode==='login'?'/auth/login':'/auth/register';
  $('lg-btn').disabled=true;$('lg-btn').textContent='请稍候…';
  apiFetch('POST',path,{username:u,password:p}).then(function(d){
    TOKEN=d.token||'';localStorage.setItem('mxz_token',TOKEN);
    DB.user={id:d.user.id,username:d.user.username,name:d.user.username};saveDB();
    enterApp();pullStats();pullWorks();
  }).catch(function(e){
    loginError(e&&e.status?(e.message||'登录失败'):'无法连接服务器：请确认后端已部署，且已允许本站访问(CORS)');
  }).then(function(){$('lg-btn').disabled=false;$('lg-btn').textContent=loginMode==='login'?'登录':'注册并进入';});
}
function enterApp(){$('login').classList.add('hide');$('topbar').classList.remove('hide');$('main').classList.remove('hide');applyTheme(DB.theme||'light');goDash();}
function applyTheme(t){DB.theme=t;document.body.setAttribute('data-theme',t);$('themeBtn').textContent=t==='dark'?'☀️':'🌙';saveDB();}
$('themeBtn').onclick=function(){applyTheme(document.body.getAttribute('data-theme')==='dark'?'light':'dark');};
$('logoutBtn').onclick=function(){TOKEN='';localStorage.removeItem('mxz_token');DB.user=null;saveDB();location.reload();};

/* ================= 作品台 ================= */
$('brandHome').onclick=goDash;
function goDash(){
  curWorkId=null;
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  $('dash').classList.add('active');$('workTabs').classList.add('hide');
  $('exportBtn').classList.add('hide');$('focusBtn').classList.add('hide');$('curWork').classList.add('hide');exitFocus();
  $('dashHello').textContent=DB.user?('你好，'+DB.user.name):'我的作品';
  renderWorks();renderCalendar();renderToday();
}
function renderWorks(){
  var box=$('works');box.innerHTML='';
  DB.works.forEach(function(w){

  $('modal').innerHTML='<div class="modal"><h4>添加修改批注</h4><div class="quote">'+esc(quote)+'</div><textarea id="cmInput" placeholder="写下修改意见，例如：这里节奏太慢，想加快；或：把这段改成下雨的夜晚…"></textarea><div class="modal-btns"><button class="mbtn" id="mCancel">取消</button><button class="mbtn p" id="mOk">保存批注</button></div></div>';
  $('modal').classList.remove('hide');var inp=$('cmInput');inp.focus();
  $('mCancel').onclick=closeModal;$('mOk').onclick=function(){var v=inp.value;if(!v.trim()){toast('请填写修改意见');inp.focus();return;}closeModal();onOk(v.trim());};
}
function quoteAlive(content,quote){
  content=content||'';quote=quote||'';
  if(!quote)return false;
  if(content.indexOf(quote)>=0)return true;
  var L=quote.length;if(L<=5)return false;
  var need=Math.max(5,Math.floor(L*0.4));
  for(var i=0;i+need<=L;i++){if(content.indexOf(quote.substr(i,need))>=0)return true;}
  return false;
}
function pruneComments(c){var n=c.comments.length;c.comments=c.comments.filter(function(cm){return quoteAlive(c.content,cm.quote);});return c.comments.length!==n;}
function refreshComments(){var c=CH();if(!$('sr-cmts'))return;var cnt=$('sr-cmtCount');if(cnt)cnt.textContent='('+c.comments.length+')';renderCommentList($('sr-cmts'),c);}
function renderCommentList(box,c){
  box.innerHTML='';
  if(!c.comments.length){box.innerHTML='<div style="color:var(--muted);font-size:12.5px;margin-bottom:8px">选中正文 → 点「＋ 批注」记录修改意见，会自动汇总成可复制的批注。</div>';return;}
  c.comments.forEach(function(cm){
    var snip=cm.quote.length>40?cm.quote.slice(0,40)+'…':cm.quote;
    var el=document.createElement('div');el.className='cmt';el.style.cursor='pointer';el.title='点击跳转到正文该段';
    el.innerHTML='<div class="para">第 '+cm.para+' 段</div><div class="q">“'+esc(snip)+'”</div><textarea placeholder="修改意见…">'+esc(cm.note)+'</textarea><div class="cfoot"><button class="linklike">删除</button></div>';
    el.onclick=function(){locateComment(cm);};
    var ta=el.querySelector('textarea');
    ta.onmousedown=function(e){e.stopPropagation();};ta.onclick=function(e){e.stopPropagation();};
    ta.oninput=function(e){cm.note=e.target.value;touchSave();};
    el.querySelector('.linklike').onclick=function(e){e.stopPropagation();c.comments=c.comments.filter(function(x){return x.id!==cm.id;});saveDB();renderSideR();};
    box.appendChild(el);
  });
}
function findQuotePos(content,quote){
  var i=content.indexOf(quote);if(i>=0)return {idx:i,len:quote.length};
  var L=quote.length;if(L<=5)return null;var need=Math.max(5,Math.floor(L*0.4));
  for(var w=L;w>=need;w--){for(var s=0;s+w<=L;s++){var pos=content.indexOf(quote.substr(s,w));if(pos>=0)return {idx:pos,len:w};}}
  return null;
}
function caretTop(ta,index){
  var cs=getComputedStyle(ta);var div=document.createElement('div');
  ['fontFamily','fontSize','fontWeight','lineHeight','letterSpacing','paddingTop','paddingRight','paddingBottom','paddingLeft','textIndent'].forEach(function(p){div.style[p]=cs[p];});
  div.style.position='absolute';div.style.visibility='hidden';div.style.boxSizing='border-box';
  div.style.width=ta.clientWidth+'px';div.style.whiteSpace='pre-wrap';div.style.wordWrap='break-word';div.style.wordBreak='break-word';
  div.textContent=ta.value.substring(0,index);
  var span=document.createElement('span');span.textContent='​';div.appendChild(span);
  document.body.appendChild(div);var top=span.offsetTop;document.body.removeChild(div);return top;
}
function locateComment(cm){
  var pos=findQuotePos(editor.value,cm.quote);
  if(!pos){toast('原文已大幅改动，定位不到');return;}
  editor.focus();editor.setSelectionRange(pos.idx,pos.idx+pos.len);
  try{editor.scrollTop=Math.max(0,caretTop(editor,pos.idx)-editor.clientHeight*0.3);}catch(e){}
  syncSel();
}
function chapSummaryText(c){if(!c.comments.length)return '';var s='— '+(c.title||'未命名')+' —\n';c.comments.forEach(function(cm,i){s+=(i+1)+'. 【第 '+cm.para+' 段】\n   原文：“'+cm.quote+'”\n   意见：'+(cm.note||'（未填写）')+'\n';});return s;}
function copyChSummary(){var w=W(),c=CH();if(!c.comments.length){toast('本章还没有批注');return;}copyText('【修改批注 ·《'+w.title+'》】\n\n'+chapSummaryText(c),'已复制本章修改批注');}
function copyAllSummary(){var w=W();var blocks=w.chapters.map(chapSummaryText).filter(Boolean);if(!blocks.length){toast('全书还没有批注');return;}copyText('【修改批注 ·《'+w.title+'》】\n\n'+blocks.join('\n'),'已复制全书修改批注');}

/* ===== 章节版本快照（轻量） ===== */
var MAXSNAP=3;
function pushSnapshot(c,label){
  if(!c.snapshots)c.snapshots=[];
  var last=c.snapshots[c.snapshots.length-1];
  if(last&&last.content===(c.content||''))return false;
  c.snapshots.push({id:uid(),ts:Date.now(),label:label||'手动存档',content:c.content||''});
  if(c.snapshots.length>MAXSNAP)c.snapshots.splice(0,c.snapshots.length-MAXSNAP);
  var w=W();if(w)w._unsynced=true;saveDB();scheduleWorkPush(w);return true;
}
function snapTime(ts){var d=new Date(ts),p=function(n){return (n<10?'0':'')+n;};return (d.getMonth()+1)+'月'+d.getDate()+'日 '+p(d.getHours())+':'+p(d.getMinutes());}
$('verBtn').onclick=openVersionModal;
function openVersionModal(){
  var c=CH();var snaps=c.snapshots.slice().reverse();
  var rows=snaps.length?snaps.map(function(s){
    return '<div class="ver-row" data-id="'+s.id+'"><div class="ver-meta"><div class="vl">'+esc(s.label)+'</div><div class="vt">'+snapTime(s.ts)+' · '+wlen(s.content)+' 字</div></div><div class="vbtns"><button class="vmini vprev">预览</button><button class="vmini vrest">恢复</button><button class="vmini danger vdel">删</button></div></div>';
  }).join(''):'<div class="ver-empty">还没有版本。写一会儿会自动存「每日存档」，或点下面手动存一版。</div>';
  $('modal').innerHTML='<div class="modal wide"><h4>版本历史 · '+esc(c.title||'本章')+'</h4>'
    +'<div class="modal-btns" style="justify-content:flex-start;margin-bottom:4px"><button class="mbtn p" id="vSave">＋ 存为当前版本</button></div>'
    +'<div class="ver-list">'+rows+'</div><div class="modal-btns"><button class="mbtn" id="mCancel">关闭</button></div></div>';
  $('modal').classList.remove('hide');$('mCancel').onclick=closeModal;
  $('vSave').onclick=function(){showPrompt('版本名称','存档 '+snapTime(Date.now()),function(name){var cc=CH();cc.content=editor.value;if(pushSnapshot(cc,(name||'').trim()||'手动存档'))toast('已存为版本');else toast('内容无变化，未重复存');openVersionModal();});};
  Array.prototype.forEach.call($('modal').querySelectorAll('.ver-row'),function(row){
    var s=c.snapshots.find(function(x){return x.id===row.dataset.id;});
    row.querySelector('.vprev').onclick=function(){showSnapDiff(c,s);};
    row.querySelector('.vrest').onclick=function(){showConfirm('恢复版本','恢复到「'+s.label+'」？当前内容会先自动存一版，可再反悔。',function(){restoreSnapshot(c,s);});};
    row.querySelector('.vdel').onclick=function(){c.snapshots=c.snapshots.filter(function(x){return x.id!==s.id;});var w=W();if(w)w._unsynced=true;saveDB();scheduleWorkPush(w);openVersionModal();};
  });
}
function diffLines(o,n){
  var a=o.length,b=n.length,dp=[],i,j;for(i=0;i<=a;i++)dp.push(new Array(b+1).fill(0));
  for(i=a-1;i>=0;i--)for(j=b-1;j>=0;j--)dp[i][j]=o[i]===n[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
  var out=[];i=0;j=0;
  while(i<a&&j<b){if(o[i]===n[j]){out.push({t:'eq',v:o[i]});i++;j++;}else if(dp[i+1][j]>=dp[i][j+1]){out.push({t:'del',v:o[i]});i++;}else{out.push({t:'add',v:n[j]});j++;}}
  while(i<a)out.push({t:'del',v:o[i++]});
  while(j<b)out.push({t:'add',v:n[j++]});
  return out;
}
function showSnapDiff(c,s){
  var cur=(curChapterId===c.id?editor.value:(c.content||'')).split('\n');
  var snap=(s.content||'').split('\n');
  var d=diffLines(cur,snap);
  var html=d.map(function(x){return '<span class="'+x.t+'">'+(x.v===''?' ':esc(x.v))+'</span>';}).join('');
  $('modal').innerHTML='<div class="modal wide"><h4>预览版本 · '+esc(s.label)+'</h4><div class="difflegend"><span class="a">绿色＝恢复后会出现</span>　<span class="d">红色＝恢复后会消失</span></div><div class="diff">'+html+'</div><div class="modal-btns"><button class="mbtn" id="vBack">返回</button><button class="mbtn p" id="vRest2">恢复此版本</button></div></div>';
  $('modal').classList.remove('hide');
  $('vBack').onclick=openVersionModal;
  $('vRest2').onclick=function(){showConfirm('恢复版本','恢复到「'+s.label+'」？当前内容会先自动存一版。',function(){restoreSnapshot(c,s);});};
}
function restoreSnapshot(c,s){
  c.content=(curChapterId===c.id?editor.value:c.content);pushSnapshot(c,'恢复前');
  c.content=s.content||'';saveDB();
  if(curChapterId===c.id){editor.value=c.content;pruneComments(c);renderSideR();updateStatus();}
  closeModal();toast('已恢复到：'+s.label);
}

/* @引用 */
var atpop=$('atpop'),atSel=0,atItems=[];
function checkAt(){
  var pos=editor.selectionStart,before=editor.value.slice(0,pos);var m=before.match(/@([^\s@]{0,8})$/);
  if(!m){atpop.classList.add('hide');return;}
  var q=m[1],w=W();atItems=w.settings.filter(function(s){return s.cat==='人物'||s.cat==='地点';}).filter(function(s){return !q||s.title.indexOf(q)>=0;});atSel=0;
  if(!atItems.length){atpop.innerHTML='<div class="empty">无匹配设定</div>';atpop.classList.remove('hide');return;}
  atpop.innerHTML=atItems.map(function(s,i){return '<div class="ai'+(i===0?' sel':'')+'" data-i="'+i+'">'+esc(s.title)+' <span style="color:var(--muted);font-size:11px">'+s.cat+'</span></div>';}).join('');
  atpop.classList.remove('hide');Array.prototype.forEach.call(atpop.querySelectorAll('.ai'),function(el){el.onclick=function(){insertAt(atItems[+el.dataset.i].title);};});
}
function insertAt(name){var pos=editor.selectionStart,before=editor.value.slice(0,pos),after=editor.value.slice(pos);before=before.replace(/@([^\s@]{0,8})$/,name);editor.value=before+after;var np=before.length;editor.setSelectionRange(np,np);CH().content=editor.value;atpop.classList.add('hide');editor.focus();updateStatus();touchSave();}
editor.addEventListener('keydown',function(e){if(atpop.classList.contains('hide')||!atItems.length)return;if(e.key==='ArrowDown'||e.key==='ArrowUp'){e.preventDefault();atSel=(atSel+(e.key==='ArrowDown'?1:atItems.length-1))%atItems.length;Array.prototype.forEach.call(atpop.querySelectorAll('.ai'),function(el,i){el.classList.toggle('sel',i===atSel);});}else if(e.key==='Enter'){e.preventDefault();insertAt(atItems[atSel].title);}else if(e.key==='Escape')atpop.classList.add('hide');});
editor.addEventListener('blur',function(){setTimeout(function(){atpop.classList.add('hide');},150);});

/* 专注（可编辑 + 章节切换 + 滑动） */
function fillFocusSelect(){var w=W();$('fbSelect').innerHTML=w.chapters.map(function(c){return '<option value="'+c.id+'"'+(c.id===curChapterId?' selected':'')+'>'+esc(c.title||'未命名')+'</option>';}).join('');}
function exitFocus(){document.body.classList.remove('focus');$('focusBar').classList.add('hide');}
function enterFocus(){if(!$('v-write').classList.contains('active'))switchTab('write');document.body.classList.add('focus');$('focusBar').classList.remove('hide');fillFocusSelect();editor.focus();}
$('focusBtn').onclick=function(){if(document.body.classList.contains('focus'))exitFocus();else enterFocus();};
$('fbExit').onclick=exitFocus;
$('fbSelect').onchange=function(){gotoChapterById(this.value);};
$('fbPrev').onclick=function(){gotoChapterDelta(-1);};
$('fbNext').onclick=function(){gotoChapterDelta(1);};
function gotoChapterById(id){var w=W();if(!w.chapters.find(function(c){return c.id===id;}))return;curChapterId=id;w.curChapter=id;saveDB();loadChapter();fillFocusSelect();renderChapList();if(document.body.classList.contains('focus'))editor.focus();}
function gotoChapterDelta(d){var w=W();var i=w.chapters.findIndex(function(c){return c.id===curChapterId;});var j=i+d;if(j<0||j>=w.chapters.length){toast(d<0?'已是第一章':'已是最后一章');return;}gotoChapterById(w.chapters[j].id);}
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&document.body.classList.contains('focus'))exitFocus();});
var tsX=0,tsY=0;
editor.addEventListener('touchstart',function(e){if(!document.body.classList.contains('focus'))return;tsX=e.changedTouches[0].clientX;tsY=e.changedTouches[0].clientY;},{passive:true});
editor.addEventListener('touchend',function(e){if(!document.body.classList.contains('focus'))return;var dx=e.changedTouches[0].clientX-tsX,dy=e.changedTouches[0].clientY-tsY;if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*2)gotoChapterDelta(dx<0?1:-1);},{passive:true});

/* ================= 预览（连续滚动，定位当前章） ================= */
function chapHtml(c){
  var html='<h2 id="pc-'+c.id+'">'+esc(c.title||'未命名')+'</h2><div class="cw">本章 '+wlen(c.content)+' 字</div>';
  var ps=(c.content||'').split(/\n+/).map(function(l){return l.replace(/^[\s　]+/,'').trim();}).filter(function(l){return l;});
  if(!ps.length)html+='<p style="color:var(--muted);text-indent:0">（本章暂无正文）</p>';
  ps.forEach(function(p){html+='<p>'+esc(p)+'</p>';});return html;
}
function renderPreview(){
  var w=W();if(!w)return;
  var side=$('prevSide');side.innerHTML=w.chapters.map(function(c){return '<div class="pli'+(c.id===prevSel?' active':'')+'" data-id="'+c.id+'">'+esc(c.title||'未命名')+'</div>';}).join('');
  Array.prototype.forEach.call(side.querySelectorAll('.pli'),function(el){el.onclick=function(){prevSel=el.dataset.id;side.querySelectorAll('.pli').forEach(function(x){x.classList.toggle('active',x===el);});scrollToChap(prevSel);};});
  $('reader').innerHTML='<h1>'+esc(w.title)+'</h1>'+w.chapters.map(chapHtml).join('');
  setTimeout(function(){scrollToChap(prevSel);},30);
}
function scrollToChap(id){var t=document.getElementById('pc-'+id);if(t)$('reader').parentNode.scrollTop=t.offsetTop-16;}

/* ================= 导出 ================= */
$('exportBtn').onclick=function(){showChoice('选择导出格式',[{label:'纯文本 .txt',fn:expTxt},{label:'Word .doc',fn:expDoc}]);};
function fullText(){var w=W();return w.chapters.map(function(c){return (c.title||'')+'\n\n'+(c.content||'');}).join('\n\n\n');}
function dl(name,blob){var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},800);}
function expTxt(){var w=W();dl(w.title+'.txt',new Blob([fullText()],{type:'text/plain;charset=utf-8'}));}
function expDoc(){var w=W();var body=w.chapters.map(function(c){var ps=(c.content||'').split(/\n+/).map(function(l){return l.replace(/^[\s　]+/,'').trim();}).filter(function(l){return l;});return '<h2>'+esc(c.title||'')+'</h2>'+ps.map(function(p){return '<p style="text-indent:2em">'+esc(p)+'</p>';}).join('');}).join('');var html='<html xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"></head><body style="font-family:SimSun;font-size:14px;line-height:1.9"><h1 style="text-align:center">'+esc(w.title)+'</h1>'+body+'</body></html>';dl(w.title+'.doc',new Blob(['﻿'+html],{type:'application/msword'}));}

/* ================= 保存 + 启动 ================= */
var st=null;function touchSave(){clearTimeout(st);st=setTimeout(function(){var w=W();if(w){w.updatedAt=Date.now();w._unsynced=true;}saveDB();scheduleWorkPush(w);},400);}
window.addEventListener('beforeunload',saveDB);
/* 自动登录：有 token 就用后端校验；离线则用本地缓存；否则回到登录页 */
if(BACKEND&&TOKEN){
  apiFetch('GET','/auth/me').then(function(d){
    DB.user={id:d.id,username:d.username,name:d.username};saveDB();enterApp();pullStats();pullWorks();
  }).catch(function(){
    if(!online&&DB.user){enterApp();}                              // 离线：用缓存继续
    else{TOKEN='';localStorage.removeItem('mxz_token');setTimeout(function(){$('lg-user').focus();},100);}
  });
}else if(!BACKEND&&DB.user){enterApp();}
else{setTimeout(function(){$('lg-user').focus();},100);}
